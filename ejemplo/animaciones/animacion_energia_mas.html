<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pozo Cuántico - Conservación de Energía M.A.S.</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            /* Quantum Visual Theme */
            --bg-void: #0a0a0c;
            --surface-glass: rgba(20, 20, 25, 0.6);
            --border-glass: rgba(255, 255, 255, 0.05);

            --color-u: #00f0ff;
            /* Potential Energy - Cyan */
            --color-k: #ff3c00;
            /* Kinetic Energy - Magma Orange */
            --color-e: #00ff66;
            /* Total Energy - Emerald */
            --color-particle: #ffffff;
            /* The Orb */
            --text-main: #fcfcfc;
            --text-dim: #8b8b99;

            --font-ui: 'Montserrat', sans-serif;
            --font-math: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-void);
            color: var(--text-main);
            font-family: var(--font-ui);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Starry/Deep Space subtle background */
            background-image:
                radial-gradient(ellipse at 50% 120%, rgba(0, 240, 255, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 10% 0%, rgba(255, 60, 0, 0.05) 0%, transparent 50%),
                url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='50' cy='50' r='0.5' fill='rgba(255,255,255,0.05)'/%3E%3Ccircle cx='10' cy='20' r='0.3' fill='rgba(255,255,255,0.03)'/%3E%3C/svg%3E");
        }

        /* TOP HEADER */
        header {
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-glass);
            background: linear-gradient(180deg, rgba(10, 10, 12, 0.9) 0%, transparent 100%);
            z-index: 10;
        }

        .title-block h1 {
            font-weight: 700;
            font-size: 1.6rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title-block h1 i {
            color: var(--color-u);
            text-shadow: 0 0 15px var(--color-u);
        }

        .title-block .subtitle {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-top: 4px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* THERMODYNAMIC STATUS READOUT */
        .master-eq {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid var(--border-glass);
            font-family: var(--font-math);
            font-size: 1.1rem;
        }

        .eq-term {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .eq-val {
            font-weight: 700;
            min-width: 60px;
            text-align: right;
        }

        .eq-plus {
            color: var(--text-dim);
        }

        .term-k {
            color: var(--color-k);
            text-shadow: 0 0 8px rgba(255, 60, 0, 0.5);
        }

        .term-u {
            color: var(--color-u);
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.5);
        }

        .term-e {
            color: var(--color-e);
            text-shadow: 0 0 8px rgba(0, 255, 102, 0.5);
        }

        /* MAIN CONTENT GRID */
        main {
            flex: 1;
            display: grid;
            grid-template-rows: 1fr auto;
            position: relative;
        }

        /* CANVAS AREA */
        .canvas-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* FLOATING DIAGNOSTICS PANELS */
        .diag-panel {
            position: absolute;
            background: var(--surface-glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 1.5rem;
            pointer-events: none;
        }

        .diag-left {
            top: 30px;
            left: 30px;
        }

        .diag-title {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .bar-chart-mini {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 80px;
        }

        .bar-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 40px;
        }

        .bar-fill {
            width: 16px;
            background: #fff;
            border-radius: 4px 4px 0 0;
            transition: height 0.05s linear;
        }

        .bar-col.u .bar-fill {
            background: linear-gradient(0deg, transparent, var(--color-u));
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
        }

        .bar-col.k .bar-fill {
            background: linear-gradient(0deg, transparent, var(--color-k));
            box-shadow: 0 0 10px rgba(255, 60, 0, 0.4);
        }

        .bar-col.e .bar-fill {
            background: var(--color-e);
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.4);
            height: 100%;
            /* Total E is fixed height relative */
        }

        .bar-lbl {
            font-family: var(--font-math);
            font-size: 0.8rem;
            font-weight: 700;
        }

        .bar-col.u .bar-lbl {
            color: var(--color-u);
        }

        .bar-col.k .bar-lbl {
            color: var(--color-k);
        }

        .bar-col.e .bar-lbl {
            color: var(--color-e);
        }

        /* CONTROL DASHBOARD (Neumorphic Dark Glass) */
        .dashboard {
            background: rgba(10, 10, 12, 0.85);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-glass);
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3rem;
            z-index: 10;
        }

        .ctrl-block {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 250px;
        }

        .ctrl-hdr {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ctrl-lbl {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ctrl-val-box {
            background: var(--bg-void);
            border: 1px solid var(--border-glass);
            padding: 4px 10px;
            border-radius: 6px;
            font-family: var(--font-math);
            font-size: 0.95rem;
            min-width: 80px;
            text-align: right;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        /* CUSTOM SLIDERS */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        /* Different tracks depending on parameter */
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            border: 1px solid rgba(0, 0, 0, 0.8);
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        /* Amplitude uses U color */
        #slA::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: var(--color-u);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
            margin-top: -8px;
            cursor: pointer;
        }

        /* Constant k gets total E color */
        #slK::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: var(--color-e);
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.6);
            margin-top: -8px;
            cursor: pointer;
        }

        /* Mass gets K color */
        #slM::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: var(--color-k);
            box-shadow: 0 0 15px rgba(255, 60, 0, 0.6);
            margin-top: -8px;
            cursor: pointer;
        }

        .actions {
            display: flex;
            gap: 15px;
            margin-left: 20px;
        }

        .btn-action {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }

        .btn-action.play {
            background: rgba(0, 240, 255, 0.1);
            border-color: var(--color-u);
            color: var(--color-u);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }

        .btn-action:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>

    <header>
        <div class="title-block">
            <h1><i class="fa-solid fa-atom"></i> Pozo de Potencial Cuántico</h1>
            <div class="subtitle">Análisis Termodinámico y Conservación de Energía (M.A.S.)</div>
        </div>

        <div class="master-eq">
            <div class="eq-term term-e">
                <span>E</span>
                <span class="eq-val" id="topE">1.80 J</span>
            </div>
            <div class="eq-plus">=</div>
            <div class="eq-term term-u">
                <span>U</span>
                <span class="eq-val" id="topU">0.00 J</span>
            </div>
            <div class="eq-plus">+</div>
            <div class="eq-term term-k">
                <span>K</span>
                <span class="eq-val" id="topK">1.80 J</span>
            </div>
        </div>
    </header>

    <main>
        <div class="canvas-wrapper" id="wrap">
            <canvas id="energyCanvas"></canvas>

            <div class="diag-panel diag-left">
                <div class="diag-title">Balance Energético</div>
                <div class="bar-chart-mini">
                    <div class="bar-col u">
                        <div class="bar-fill" id="barU"></div>
                        <div class="bar-lbl">U</div>
                    </div>
                    <div class="bar-col k">
                        <div class="bar-fill" id="barK"></div>
                        <div class="bar-lbl">K</div>
                    </div>
                    <div class="bar-col e">
                        <div class="bar-fill"></div>
                        <div class="bar-lbl">E</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="dashboard">
            <!-- As per image 4: Amplitude 30cm, k 40 N/m, m 10 kg -> E = 1.8 J -->

            <div class="ctrl-block">
                <div class="ctrl-hdr">
                    <div class="ctrl-lbl"><i class="fa-solid fa-arrows-left-right-to-line"
                            style="color:var(--color-u)"></i> Amplitud ($A$)</div>
                    <div class="ctrl-val-box" id="valA">30 cm</div>
                </div>
                <input type="range" id="slA" min="5" max="50" step="1" value="30">
            </div>

            <div class="ctrl-block">
                <div class="ctrl-hdr">
                    <div class="ctrl-lbl"><i class="fa-solid fa-hurricane" style="color:var(--color-e)"></i> Cte Resorte
                        ($k$)</div>
                    <div class="ctrl-val-box" id="valk">40 N/m</div>
                </div>
                <input type="range" id="slK" min="10" max="100" step="5" value="40">
            </div>

            <div class="ctrl-block">
                <div class="ctrl-hdr">
                    <div class="ctrl-lbl"><i class="fa-solid fa-weight-hanging" style="color:var(--color-k)"></i> Masa
                        ($m$)</div>
                    <div class="ctrl-val-box" id="valM">10 kg</div>
                </div>
                <input type="range" id="slM" min="1" max="50" step="1" value="10">
            </div>

            <div class="actions">
                <button class="btn-action play" id="btnPlay"><i class="fa-solid fa-pause"></i></button>
                <button class="btn-action" id="btnRecenter"><i class="fa-solid fa-crosshairs"></i></button>
            </div>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('energyCanvas');
        const ctx = canvas.getContext('2d');
        const wrap = document.getElementById('wrap');

        // UI Elements
        const slA = document.getElementById('slA');
        const slK = document.getElementById('slK');
        const slM = document.getElementById('slM');

        const valAUI = document.getElementById('valA');
        const valkUI = document.getElementById('valk');
        const valMUI = document.getElementById('valM');

        const topE = document.getElementById('topE');
        const topU = document.getElementById('topU');
        const topK = document.getElementById('topK');

        const barU = document.getElementById('barU');
        const barK = document.getElementById('barK');

        const btnPlay = document.getElementById('btnPlay');
        const btnRecenter = document.getElementById('btnRecenter');

        // Physics State (MKS)
        let A = 0.3;     // Amplitude in meters
        let k = 40;      // N/m
        let m = 10;      // kg

        let ETotal = 0;  // Calculated: 1/2 k A^2
        let omega = 0;   // Calculated: sqrt(k/m)
        let time = 0;
        let isPlaying = true;
        let isDragging = false;

        let currentX = 0; // Current position in meters

        // Rendering Layout
        let W, H;
        let originX, originY;
        let pxPerMeterX;
        let pxPerJouleY;

        function updatePhysicsConsts() {
            A = parseFloat(slA.value) / 100; // cm -> m
            k = parseFloat(slK.value);
            m = parseFloat(slM.value);

            ETotal = 0.5 * k * A * A;
            omega = Math.sqrt(k / m);

            valAUI.innerText = `${slA.value} cm`;
            valkUI.innerText = `${k} N/m`;
            valMUI.innerText = `${m} kg`;

            // Recompute scaling to fit the new parabola nicely
            if (!isDragging && isPlaying === false) {
                // Keep X at the same relative place if paused and tweaking A
                // Or snap it to A if it exceeds
                if (Math.abs(currentX) > A) {
                    currentX = Math.sign(currentX) * A;
                }
            }
        }

        function resize() {
            W = canvas.width = wrap.clientWidth;
            H = canvas.height = wrap.clientHeight;

            originX = W / 2;
            originY = H * 0.85; // Origin near the bottom
        }

        window.addEventListener('resize', resize);

        function calculateScales() {
            // How many meters should fit horizontally? 
            // We want A=0.5m max to take up maybe 80% of width.
            const maxVisibleMeters = 1.2; // -0.6 to +0.6
            pxPerMeterX = W / maxVisibleMeters;

            // How many Joules vertically?
            // Max k=100, max A=0.5 -> max E = 0.5*100*0.25 = 12.5 J
            const maxVisibleJoules = 14.0;
            // From originY up to top (H*0.1)
            const availablePxY = originY - (H * 0.1);
            pxPerJouleY = availablePxY / maxVisibleJoules;
        }

        function drawAxes() {
            ctx.save();
            ctx.lineWidth = 1;

            // X Axis (Position cm)
            ctx.strokeStyle = '#4a4a5a';
            ctx.beginPath();
            ctx.moveTo(0, originY);
            ctx.lineTo(W, originY);
            ctx.stroke();

            // Y Axis (Energy J)
            ctx.beginPath();
            ctx.moveTo(originX, H); // go all the way down
            ctx.lineTo(originX, 0);
            ctx.stroke();

            // X Axis Ticks (cm)
            ctx.fillStyle = '#8b8b99';
            ctx.font = '10px "JetBrains Mono"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';

            // Draw ticks every 10cm (0.1m)
            for (let mt = -0.5; mt <= 0.5; mt += 0.1) {
                const px = originX + (mt * pxPerMeterX);
                if (px > 0 && px < W) {
                    ctx.beginPath();
                    ctx.moveTo(px, originY);
                    ctx.lineTo(px, originY + 5);
                    ctx.stroke();
                    if (Math.abs(mt) > 0.01) { // Skip 0
                        ctx.fillText((mt * 100).toFixed(0), px, originY + 8);
                    }
                }
            }
            ctx.fillText("x (cm)", W - 30, originY + 8);

            // Y Axis Ticks (Joules)
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            for (let j = 0; j <= 12; j += 2) {
                const py = originY - (j * pxPerJouleY);
                if (py > 0) {
                    ctx.beginPath();
                    ctx.moveTo(originX - 5, py);
                    ctx.lineTo(originX, py);
                    ctx.stroke();
                    if (j > 0) ctx.fillText(j.toFixed(1), originX - 8, py);
                }
            }
            ctx.fillText("E (J)", originX - 8, 20);

            ctx.restore();
        }

        function renderEnergiesAndParabola() {
            const currentU = 0.5 * k * currentX * currentX;
            // Force K to be positive or 0 (floating point errors prevent exactly ETotal)
            const currentK = Math.max(0, ETotal - currentU);

            // 1. Draw Parabola U(x)
            ctx.save();
            ctx.beginPath();
            // Start from extreme left that's visible
            for (let px = 0; px <= W; px += 2) {
                const m = (px - originX) / pxPerMeterX;
                const u = 0.5 * k * m * m;
                const py = originY - (u * pxPerJouleY);
                if (px === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.strokeStyle = '#00f0ff'; // color-u
            ctx.lineWidth = 3;
            // Outer glow
            ctx.shadowColor = '#00f0ff';
            ctx.shadowBlur = 15;
            ctx.stroke();
            ctx.restore();

            // 2. Draw Total Energy Line (E)
            const ePy = originY - (ETotal * pxPerJouleY);
            const aPxLeft = originX - (A * pxPerMeterX);
            const aPxRight = originX + (A * pxPerMeterX);

            ctx.save();
            ctx.beginPath();
            ctx.setLineDash([5, 5]);
            ctx.moveTo(0, ePy);
            ctx.lineTo(W, ePy);
            ctx.strokeStyle = '#00ff66'; // color-e
            ctx.lineWidth = 1;
            ctx.shadowColor = '#00ff66';
            ctx.shadowBlur = 4;
            ctx.stroke();

            // Draw Amplitude boundaries (Vertical limits)
            ctx.beginPath();
            ctx.moveTo(aPxLeft, originY); ctx.lineTo(aPxLeft, ePy);
            ctx.moveTo(aPxRight, originY); ctx.lineTo(aPxRight, ePy);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.stroke();
            ctx.restore();

            // 3. Current Particle X position
            const cPx = originX + (currentX * pxPerMeterX);
            const cPyU = originY - (currentU * pxPerJouleY); // Point on the parabola

            // Draw U bar (Blue)
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(cPx, originY);
            ctx.lineTo(cPx, cPyU);
            ctx.strokeStyle = 'rgba(0, 240, 255, 0.8)';
            ctx.lineWidth = 4;
            ctx.shadowColor = '#00f0ff';
            ctx.shadowBlur = 10;
            ctx.stroke();

            // Draw K bar (Orange)
            ctx.beginPath();
            ctx.moveTo(cPx, cPyU);
            ctx.lineTo(cPx, ePy);
            ctx.strokeStyle = 'rgba(255, 60, 0, 0.9)';
            ctx.shadowColor = '#ff3c00';
            ctx.stroke();
            ctx.restore();

            // Draw the Quantum Particle
            ctx.save();
            ctx.beginPath();
            ctx.arc(cPx, cPyU, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 20;
            ctx.fill();

            // Add a little aura showing kinetic intensity
            if (currentK > 0) {
                ctx.beginPath();
                const kiSize = 8 + (currentK / ETotal) * 10;
                ctx.arc(cPx, cPyU, kiSize, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 60, 0, 0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            ctx.restore();

            return { currentU, currentK };
        }

        let lastTimestamp = 0;

        function loop(timestamp) {
            if (!lastTimestamp) lastTimestamp = timestamp;
            const dt = (timestamp - lastTimestamp) / 1000;
            lastTimestamp = timestamp;

            calculateScales();

            if (isPlaying && !isDragging) {
                time += dt;
                // Harmonic oscillator position
                currentX = A * Math.cos(omega * time);
            }

            // CLEAN
            ctx.clearRect(0, 0, W, H);

            // DRAW
            drawAxes();
            const { currentU, currentK } = renderEnergiesAndParabola();

            // UPDATE DOM STATS
            topE.innerHTML = `${ETotal.toFixed(2)} J`;
            topU.innerHTML = `${currentU.toFixed(2)} J`;
            topK.innerHTML = `${currentK.toFixed(2)} J`;

            // Render HUD bars
            if (ETotal > 0) {
                barU.style.height = `${(currentU / ETotal) * 100}%`;
                barK.style.height = `${(currentK / ETotal) * 100}%`;
            }

            requestAnimationFrame(loop);
        }

        // --- INTERACTIVITY ---

        slA.addEventListener('input', updatePhysicsConsts);
        slK.addEventListener('input', updatePhysicsConsts);
        slM.addEventListener('input', updatePhysicsConsts);

        btnPlay.addEventListener('click', () => {
            isPlaying = !isPlaying;
            if (isPlaying) {
                btnPlay.innerHTML = '<i class="fa-solid fa-pause"></i>';
                btnPlay.classList.add('play');
            } else {
                btnPlay.innerHTML = '<i class="fa-solid fa-play"></i>';
                btnPlay.classList.remove('play');
            }
        });

        btnRecenter.addEventListener('click', () => {
            time = 0;
            currentX = A * Math.cos(0);
        });

        // Mouse Drag Interaction (Grabbing Phase)
        // User can pause the simulation by grabbing the orb and placing it freely
        const getMouseMeters = (evt) => {
            const rect = canvas.getBoundingClientRect();
            let cX = evt.touches ? evt.touches[0].clientX : evt.clientX;
            return (cX - rect.left - originX) / pxPerMeterX;
        };

        const startDrag = (e) => {
            const mX = getMouseMeters(e);
            // Check if clicked near the current X (within 0.05m tolerance)
            if (Math.abs(mX - currentX) < 0.05) {
                isDragging = true;
                isPlaying = false;
                btnPlay.innerHTML = '<i class="fa-solid fa-play"></i>';
                btnPlay.classList.remove('play');
            }
        };

        const moveDrag = (e) => {
            if (!isDragging) return;
            e.preventDefault();
            let reqX = getMouseMeters(e);

            // Clamp to Amplitude
            if (reqX > A) reqX = A;
            if (reqX < -A) reqX = -A;

            currentX = reqX;

            // Recalculate time so that if we hit play, it continues from this phase
            // x = A cos(wt) -> wt = acos(x/A) -> t = acos(x/A) / w
            // Note: arccos only given 0 to PI, moving forward it would bounce right away
            // To be precise we need velocity direction, but just setting time mathematically works for position reset
            time = Math.acos(currentX / A) / omega;
        };

        const endDrag = () => { isDragging = false; };

        canvas.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', moveDrag, { passive: false });
        window.addEventListener('mouseup', endDrag);

        canvas.addEventListener('touchstart', startDrag, { passive: false });
        window.addEventListener('touchmove', moveDrag, { passive: false });
        window.addEventListener('touchend', endDrag);

        // INIT
        resize();
        updatePhysicsConsts();
        requestAnimationFrame(loop);
    </script>
</body>

</html>
