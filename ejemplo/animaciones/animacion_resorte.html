<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Masa-Resorte - Simulador Interactivo</title>
    <!-- Fuentes Premium -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Paleta Dark Premium (Neumorphism Minimalista + Neón) */
            --bg-color: #0f172a;
            /* Slate 900 */
            --surface-color: rgba(30, 41, 59, 0.85);
            /* Slate 800 tranparente */
            --surface-border: rgba(255, 255, 255, 0.05);
            --primary-color: #3b82f6;
            /* Azul brillante */
            --primary-glow: rgba(59, 130, 246, 0.5);
            --spring-color: #10b981;
            /* Verde esmeralda */
            --spring-glow: rgba(16, 185, 129, 0.4);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;

            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            background-image:
                radial-gradient(ellipse at top left, rgba(59, 130, 246, 0.1) 0%, transparent 40%),
                radial-gradient(ellipse at bottom right, rgba(16, 185, 129, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        header {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--surface-border);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            z-index: 10;
        }

        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            letter-spacing: 0.5px;
        }

        .logo i {
            color: var(--spring-color);
        }

        .badge {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: var(--primary-color);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* MAIN LAYOUT */
        main {
            flex: 1;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 1.5rem;
            padding: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* STATS BAR */
        .stats-bar {
            display: flex;
            gap: 2rem;
            padding: 1rem 1.5rem;
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            align-items: center;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .stat-label {
            font-family: var(--font-main);
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
        }

        .stat-value {
            font-family: var(--font-mono);
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .stat-value.highlight {
            color: var(--spring-color);
            text-shadow: 0 0 10px var(--spring-glow);
        }

        /* CANVAS AND CONTROLS SPLIT */
        .sim-area {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 1.5rem;
            height: 100%;
        }

        /* CANVAS CONTAINER */
        .canvas-container {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        canvas:active {
            cursor: grabbing;
        }

        /* CONTROL PANEL */
        .controls-panel {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .panel-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--surface-border);
        }

        /* SLIDERS */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            background: rgba(0, 0, 0, 0.15);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }

        .slider-val {
            font-family: var(--font-mono);
            color: var(--primary-color);
            font-weight: 700;
            background: rgba(59, 130, 246, 0.1);
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
        }

        .slider-val.k-val {
            color: var(--spring-color);
            background: rgba(16, 185, 129, 0.1);
        }

        /* NATIVE RANGE MOLDING */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -5px;
            box-shadow: 0 0 10px var(--primary-glow);
            transition: transform 0.1s;
        }

        #sliderK::-webkit-slider-thumb {
            background: var(--spring-color);
            box-shadow: 0 0 10px var(--spring-glow);
        }

        /* BUTTONS */
        .btn-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: auto;
        }

        button {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--surface-border);
            color: var(--text-main);
            padding: 0.75rem;
            border-radius: 8px;
            font-family: var(--font-main);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-width: 100px;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        button.primary {
            background: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.3);
            color: var(--spring-color);
        }

        button.primary:hover {
            background: rgba(16, 185, 129, 0.25);
            box-shadow: 0 5px 15px var(--spring-glow);
        }

        @media (max-width: 900px) {
            .sim-area {
                grid-template-columns: 1fr;
                grid-template-rows: 2fr 1fr;
            }

            .canvas-container {
                min-height: 350px;
            }

            .stats-bar {
                flex-wrap: wrap;
                gap: 1rem;
                justify-content: space-between;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">
            <i class="fa-solid fa-wave-square"></i>
            Sistema Masa-Resorte
        </div>
        <div class="badge">Periodo $T = 2\pi\sqrt{m/k}$</div>
    </header>
    <main>
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-label">Periodo</div>
                <div class="stat-value highlight" id="valT">T = 19.87</div>
            </div>
            <div class="stat-item" style="border-left: 1px solid rgba(255,255,255,0.1); padding-left: 2rem;">
                <div class="stat-label">Posición (x)</div>
                <div class="stat-value" id="valX">0.0</div>
            </div>
            <div class="stat-item" style="border-left: 1px solid rgba(255,255,255,0.1); padding-left: 2rem;">
                <div class="stat-label">Velocidad (v)</div>
                <div class="stat-value" id="valV">0.00</div>
            </div>
        </div>

        <div class="sim-area">
            <div class="canvas-container">
                <canvas id="simCanvas"></canvas>
            </div>

            <div class="controls-panel">
                <div class="panel-title">
                    <i class="fa-solid fa-sliders"></i>
                    Parámetros (Imagen 2)
                </div>

                <div class="control-group">
                    <div class="slider-header">
                        <span>Masa ($m$)</span>
                        <span class="slider-val" id="txtM">100</span>
                    </div>
                    <!-- La imagen base muestra 100 -->
                    <input type="range" id="sliderM" min="10" max="500" step="10" value="100">
                </div>

                <div class="control-group">
                    <div class="slider-header">
                        <span>Cte. Resorte ($k$)</span>
                        <span class="slider-val k-val" id="txtK">10</span>
                    </div>
                    <!-- La imagen base muestra 10 -->
                    <input type="range" id="sliderK" min="1" max="100" step="1" value="10">
                </div>

                <div class="control-group" style="opacity: 0.7;">
                    <div class="slider-header">
                        <span>Velocidad (fps factor)</span>
                    </div>
                    <input type="range" id="sliderFPS" min="0.1" max="5.0" step="0.1" value="1.0">
                </div>

                <div class="btn-group">
                    <button class="primary" id="btnPlay"><i class="fa-solid fa-play"></i> Iniciar</button>
                    <button id="btnReset"><i class="fa-solid fa-stop"></i> Detener</button>
                </div>

                <div style="font-size: 0.8rem; color: var(--text-muted); line-height: 1.5; margin-top: auto;">
                    <strong>Aviso:</strong> Para $m=100$ y $k=10$, se garantiza matemáticamente que $T=2\pi\sqrt{100/10}
                    \approx 19.87$ s.
                </div>
            </div>
        </div>
    </main>

    <script>
        // -- Referencias --
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.querySelector('.canvas-container');

        const sliderM = document.getElementById('sliderM');
        const sliderK = document.getElementById('sliderK');
        const sliderFPS = document.getElementById('sliderFPS');

        const txtM = document.getElementById('txtM');
        const txtK = document.getElementById('txtK');

        const valT = document.getElementById('valT');
        const valX = document.getElementById('valX');
        const valV = document.getElementById('valV');

        const btnPlay = document.getElementById('btnPlay');
        const btnReset = document.getElementById('btnReset');

        // -- Física State --
        // Iniciar con valores idénticos a la imagen de referencia
        let m = 100;    // Masa (kg)
        let k = 10;     // Constante del resorte (N/m)
        let b = 0;      // Amortiguamiento para la UI limpia

        let x = 0;      // Posición actual (m) - El equilibrio es 0
        let v = 0;      // Velocidad (m/s)
        let a = 0;      // Aceleración (m/s²)

        let maxX = 150; // Amplitud inicial para que se vea el movimiento

        let isPlaying = false;
        let timeScale = 1.0;
        let lastTime = 0;
        let isDragging = false;

        // -- Visual State --
        let centerY, centerX;
        let pxPerUnit = 2; // Rango visual -200 a +200 aprox

        function resize() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;

            centerY = canvas.height / 2;
            // El punto de anclaje de la pared (izquierda)
            centerX = canvas.width * 0.1;

            // Ajustar visualización del eje
            const viewRange = 450; // de -225 a +225
            pxPerUnit = (canvas.width * 0.8) / viewRange;
        }

        window.addEventListener('resize', resize);

        // El punto de equilibrio geométrico en pantalla
        function getEquilibriumX() {
            // El resorte relajado está en el centro de la pantalla
            return canvas.width / 2;
        }

        // Posición actual de la masa en PX
        function getMassPx() {
            return getEquilibriumX() + (x * pxPerUnit);
        }

        function physicsStep(dt) {
            if (!isPlaying || isDragging) return;
            // Max dt
            if (dt > 0.05) dt = 0.05;

            dt *= timeScale; // Escala de tiempo ajustable

            // F = -kx - bv
            a = (-k * x) / m;

            // Euler semi-implícito
            v += a * dt;
            x += v * dt;
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            const size = 20;

            ctx.beginPath();
            for (let i = 0; i < canvas.width; i += size) {
                ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height);
            }
            for (let i = 0; i < canvas.height; i += size) {
                ctx.moveTo(0, i); ctx.lineTo(canvas.width, i);
            }
            ctx.stroke();
        }

        function drawAxis() {
            const eqX = getEquilibriumX();
            const y = centerY + 40; // Eje debajo de la masa

            ctx.save();
            // Línea principal
            ctx.beginPath();
            ctx.moveTo(centerX, y);
            ctx.lineTo(canvas.width - centerX, y);
            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Marcas
            ctx.fillStyle = '#cbd5e1';
            ctx.font = '500 12px "Inter"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';

            // Dibujar marcas cada 50 unidades (como en la imagen original de -200 a 200)
            for (let val = -200; val <= 200; val += 50) {
                const px = eqX + (val * pxPerUnit);
                if (px >= centerX && px <= canvas.width - centerX) {
                    ctx.beginPath();
                    // Marca grande para 50s, pequeñas para intermedios si hubiera
                    ctx.moveTo(px, y - 5);
                    ctx.lineTo(px, y + 5);
                    ctx.stroke();

                    ctx.fillText(val.toString(), px, y + 8);
                }
            }

            // Marcas intermedias más pequeñas cada 10 unidades
            ctx.strokeStyle = 'rgba(203, 213, 225, 0.5)';
            for (let val = -200; val <= 200; val += 10) {
                if (val % 50 !== 0) {
                    const px = eqX + (val * pxPerUnit);
                    if (px >= centerX && px <= canvas.width - centerX) {
                        ctx.beginPath();
                        ctx.moveTo(px, y - 3);
                        ctx.lineTo(px, y + 3);
                        ctx.stroke();
                    }
                }
            }

            ctx.restore();
        }

        function drawWall() {
            ctx.save();
            // Pared anclaje izquierda
            const wX = centerX;
            const y1 = centerY - 50;
            const y2 = centerY + 50;

            ctx.beginPath();
            ctx.moveTo(wX, y1);
            ctx.lineTo(wX, y2);
            ctx.strokeStyle = '#f8fafc';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Achurado
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(248, 250, 252, 0.3)';
            ctx.lineWidth = 1.5;
            for (let y = y1; y < y2; y += 8) {
                ctx.moveTo(wX, y);
                ctx.lineTo(wX - 15, y + 15);
            }
            ctx.stroke();

            // Anclaje del resorte
            ctx.beginPath();
            ctx.arc(wX, centerY, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#0f172a'; ctx.fill();
            ctx.strokeStyle = '#f8fafc'; ctx.stroke();

            ctx.restore();
        }

        function drawSpringAndMass() {
            const wX = centerX;
            const massX = getMassPx();
            const rectW = 60;
            const rectH = 40;

            ctx.save();

            // === RESORTE (ZIG-ZAG PARAMÉTRICO) ===
            const startX = wX;
            // El resorte termina un poco antes del centro de la masa
            const endX = massX - (rectW / 2);

            const numCoils = 10;
            const coilsTotal = numCoils * 2 + 1;
            const segmentLen = (endX - startX) / coilsTotal;
            const springAmp = 15;

            ctx.beginPath();
            ctx.moveTo(startX, centerY);

            // Segmento recto inicial
            ctx.lineTo(startX + segmentLen, centerY);

            // Espiras
            for (let i = 1; i <= numCoils; i++) {
                ctx.lineTo(startX + segmentLen * (2 * i - 0.5), centerY - springAmp);
                ctx.lineTo(startX + segmentLen * (2 * i + 0.5), centerY + springAmp);
            }

            // Hacia el centro
            ctx.lineTo(startX + segmentLen * (coilsTotal), centerY);

            ctx.strokeStyle = '#10b981';
            ctx.lineWidth = 2.5;
            // Efecto dependiendo de K (más grueso si K es alto)
            ctx.lineWidth = 1.5 + (k / 50) * 3;

            ctx.lineJoin = 'round';
            ctx.stroke();

            // === MASA (BLOQUE) ===
            // Sombra Neon/Premium
            ctx.shadowColor = 'rgba(59, 130, 246, 0.6)';
            ctx.shadowBlur = 20;
            if (isDragging) {
                ctx.shadowColor = 'rgba(16, 185, 129, 0.8)';
                ctx.shadowBlur = 30;
            }

            // Gradiente para la masa (estilo azul cyan)
            const grad = ctx.createLinearGradient(massX - rectW / 2, centerY - rectH / 2, massX + rectW / 2, centerY + rectH / 2);
            grad.addColorStop(0, '#60a5fa');
            grad.addColorStop(1, '#2563eb');

            ctx.beginPath();
            ctx.roundRect(massX - rectW / 2, centerY - rectH / 2, rectW, rectH, 10);
            ctx.fillStyle = grad;
            ctx.fill();

            // Borde
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Reset sombra
            ctx.shadowColor = 'transparent';

            // Punto de anclaje de la masa (decorativo)
            ctx.beginPath();
            ctx.arc(massX - (rectW / 2) + 8, centerY, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#0f172a'; ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();

            ctx.restore();
        }

        function loop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            physicsStep(dt);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawGrid();
            drawAxis();
            drawWall();
            drawSpringAndMass();

            // -- Actualizar UI Textos --

            // Cálculo del Periodo T = 2*pi*sqrt(m/k)
            const T = 2 * Math.PI * Math.sqrt(m / k);

            // Si la velocidad cambia de signo o está cerca de 0 al arrastrar, actualizar la interpolación
            valT.innerText = `T = ${T.toFixed(2)}`;
            valX.innerText = x.toFixed(1);
            valV.innerText = v.toFixed(2);

            requestAnimationFrame(loop);
        }

        // -- Eventos --
        function updateVariables() {
            m = parseFloat(sliderM.value);
            k = parseFloat(sliderK.value);
            timeScale = parseFloat(sliderFPS.value);

            txtM.innerText = m.toFixed(0);
            txtK.innerText = k.toFixed(0);
        }

        sliderM.addEventListener('input', updateVariables);
        sliderK.addEventListener('input', updateVariables);
        sliderFPS.addEventListener('input', updateVariables);

        btnPlay.addEventListener('click', () => {
            isPlaying = !isPlaying;
            if (isPlaying) {
                btnPlay.innerHTML = '<i class="fa-solid fa-pause"></i> Pausar';
                btnPlay.classList.add('active');

                // Si estaba parado en x=0 le damos empuje
                if (Math.abs(x) < 0.1 && Math.abs(v) < 0.1) {
                    x = maxX; // Lo soltamos desde Amplitud 150
                }
            } else {
                btnPlay.innerHTML = '<i class="fa-solid fa-play"></i> Continuar';
                btnPlay.classList.remove('active');
            }
        });

        btnReset.addEventListener('click', () => {
            x = 0;
            v = 0;
            isPlaying = false;
            btnPlay.innerHTML = '<i class="fa-solid fa-play"></i> Iniciar';
            lastTime = 0;
        });

        // Arrastrar la Masa
        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            let cX = evt.touches ? evt.touches[0].clientX : evt.clientX;
            return cX - rect.left;
        }

        function onDown(e) {
            const mX = getMousePos(e);
            const massScreenX = getMassPx();
            // Check si hizo click cerca de la masa (ancho 60)
            if (Math.abs(mX - massScreenX) < 40) {
                isDragging = true;
                isPlaying = false;
                btnPlay.innerHTML = '<i class="fa-solid fa-play"></i> Continuar';
                v = 0;
            }
        }

        function onMove(e) {
            if (!isDragging) return;
            e.preventDefault();
            const mX = getMousePos(e);

            // Convertir PX a unidad física
            const eqX = getEquilibriumX();
            // Restringir movimiento para no traspasar la pared (min x = -eqX + algo)
            const newX = (mX - eqX) / pxPerUnit;

            // Limitar a -200, 200
            if (newX > 200) x = 200;
            else if (newX < -180) x = -180; // Un poco antes para no chocar la pared
            else x = newX;

            maxX = Math.abs(x);
        }

        function onUp() {
            if (isDragging) {
                isDragging = false;
                lastTime = performance.now();
            }
        }

        canvas.addEventListener('mousedown', onDown);
        window.addEventListener('mousemove', onMove, { passive: false });
        window.addEventListener('mouseup', onUp);

        canvas.addEventListener('touchstart', onDown, { passive: false });
        window.addEventListener('touchmove', onMove, { passive: false });
        window.addEventListener('touchend', onUp);

        // Init
        resize();
        updateVariables();
        x = maxX; // Empieza estirado como la imagen
        requestAnimationFrame(loop);
    </script>
</body>

</html>
